name: aizu

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: aizu-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      - QDRANT_API_KEY=${QDRANT_API_KEY:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/readyz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  aizu-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aizu-app
    ports:
      - "8501:8501"
    depends_on:
      qdrant:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/__pycache__
      - /app/.venv
      - /app/.streamlit
    environment:
      - QDRANT_URL=http://qdrant:6333
      - PYTHONUNBUFFERED=1
      - TZ=Asia/Jakarta
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    stdin_open: true
    tty: true

volumes:
  qdrant_storage:
    name: aizu_qdrant_storage

networks:
  default:
    name: aizu-network
    driver: bridge